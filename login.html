<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marek – přihlášení</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg:        #111111;
    --surface:   #1a1a1a;
    --surface2:  #222222;
    --border:    #2e2e2e;
    --accent:    #EE220C;
    --accent-dim:#7a1106;
    --text:      #e8e8e8;
    --text-dim:  #888888;
    --text-muted:#555555;
    --radius:    12px;
    --radius-sm: 8px;
  }

  body.light {
    --bg:        #f2f2f7;
    --surface:   #ffffff;
    --surface2:  #f0f0f5;
    --border:    #d1d1d6;
    --text:      #1c1c1e;
    --text-dim:  #3a3a3c;
    --text-muted:#8e8e93;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 14px;
  }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 200;
  }

  .loading-logo svg { width: 48px; height: 48px; }

  .loading-dot-wrap { display: flex; gap: 6px; }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #login-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  #login-screen.visible { display: flex; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .login-logo {
    width: 56px;
    height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .login-logo img { width: 100%; height: 100%; object-fit: cover; }

  .login-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text);
  }

  .login-card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  #btn-google-login {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    justify-content: center;
  }

  #btn-google-login:hover { background: #2a2a2a; border-color: #3a3a3a; }
  #btn-google-login:disabled { opacity: 0.5; cursor: default; }
  #btn-google-login svg { width: 18px; height: 18px; }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a1a1a;
    border: 1px solid var(--accent-dim);
    color: #ff8070;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOADING (zatímco appka ověřuje, jestli už existuje platná session) -->
<div id="loading-screen">
  <div class="loading-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#EE220C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </div>
  <div class="loading-dot-wrap">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="icon-512.png" alt="Marek">
    </div>
    <h1>Marek</h1>
    <p>Umělá inteligence pro 10men.<br>Přihlas se svým Google účtem.</p>
    <button id="btn-google-login">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Přihlásit se přes Google
    </button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── CONFIG (stejné jako index.html) ──────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAjDCB3gpqytTHnG7zKLKJGXMNeW5vyC_I",
  authDomain: "base-39f52.firebaseapp.com",
  databaseURL: "https://base-39f52-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "base-39f52",
  storageBucket: "base-39f52.firebasestorage.app",
  messagingSenderId: "20753597026",
  appId: "1:20753597026:web:bec0c5a784492206f3c73b"
};

const SESSION_KEY = 'marek_user';

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getDatabase(app);

const $loading = document.getElementById('loading-screen');
const $login   = document.getElementById('login-screen');
const $btn     = document.getElementById('btn-google-login');
const $toast   = document.getElementById('toast');

// Zachovej zvolený theme napříč login/appkou
if (localStorage.getItem('marek_theme') === 'light') {
  document.body.classList.add('light');
}

function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 3500);
}

// Pokud už existuje platná session v localStorage, appka nemá co dělat tady
if (localStorage.getItem(SESSION_KEY)) {
  window.location.replace('index.html');
}
// Jinak login screen zůstává schovaný, dokud níže neověříme, že se
// uživatel nevrací z Google OAuth redirectu.

// ZDOKUMENTOVANÝ Firebase Auth bug (firebase-js-sdk #6716, Apple Developer
// fóra): signInWithPopup na iOS standalone PWA proběhne úspěšně na pozadí,
// ale Promise se nikdy nevrátí zpět do JS — bez chyby, appka jen visí.
// Oficiálně doporučené řešení: signInWithRedirect.
//
// DŮLEŽITÉ: na Androidu popup prokazatelně funguje (ověřeno v praxi), takže
// se redirect použije JEN na iOS (navigator.standalone), ne obecně přes
// matchMedia('display-mode: standalone') — to by zbytečně měnilo chování
// i na Androidu, kde není co opravovat.
const isStandalone = window.navigator.standalone === true

async function processAuthUser(user) {
  const snap = await get(ref(db, '/members'));
  if (!snap.exists()) {
    throw new Error('access-denied');
  }

  const members = Object.values(snap.val()).filter(m => m);
  const member = members.find(m => m.email === user.email);

  if (!member) {
    throw new Error('access-denied');
  }

  localStorage.setItem(SESSION_KEY, JSON.stringify({
    email:    member.email,
    name:     member.name,
    role:     member.role || null,
    voice:    member.voice || null,
    photoURL: user.photoURL || null,
    success:  true
  }));

  window.location.replace('index.html');
}

async function handleAuthError(e) {
  if (e.message === 'access-denied') {
    showToast('Přístup odepřen – nejsi členem 10men.');
    await signOut(auth).catch(() => {});
  } else if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
    // uživatel popup sám zavřel, netřeba strašit chybou
  } else {
    showToast('Přihlášení selhalo: ' + (e.message || e.code || 'neznámá chyba'));
  }
}

// Musí se volat při každém načtení login.html — pokud žádný redirect
// neprobíhá, vrátí null a nic se nestane. Pokud se uživatel právě vrátil
// z Google OAuth redirectu, tady se přihlášení dokončí.
(async () => {
  try {
    const result = await getRedirectResult(auth);
    if (result && result.user) {
      await processAuthUser(result.user);
      return;
    }
  } catch (e) {
    await handleAuthError(e);
  }
  $loading.style.display = 'none';
  $login.classList.add('visible');
})();

$btn.addEventListener('click', async () => {
  $btn.disabled = true;
  const provider = new GoogleAuthProvider();

  try {
    if (isStandalone) {
      // Stránka se přesměruje pryč a zpět — zpracování proběhne
      // v getRedirectResult() bloku výše po návratu.
      await signInWithRedirect(auth, provider);
    } else {
      const result = await signInWithPopup(auth, provider);
      await processAuthUser(result.user);
    }
  } catch (e) {
    await handleAuthError(e);
    $btn.disabled = false;
  }
});
</script>

</body>
</html>
