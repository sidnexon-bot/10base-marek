<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marek – 10men AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #111111;
    --surface:   #1a1a1a;
    --surface2:  #222222;
    --border:    #2e2e2e;
    --accent:    #EE220C;
    --accent-dim:#7a1106;
    --text:      #e8e8e8;
    --text-dim:  #888888;
    --text-muted:#555555;
    --user-bubble: #2a2a2a;
    --marek-bubble: #1e2a1e;
    --marek-accent: #2d4a2d;
    --sidebar-w: 260px;
    --radius:    12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    transition: transform 0.25s ease;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 18px; height: 18px; }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-text span {
    font-style: italic;
    font-weight: 400;
    color: var(--text-dim);
    font-size: 15px;
  }

  #btn-new-chat {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
  }

  #btn-new-chat:hover {
    background: #2a2a2a;
    border-color: #3a3a3a;
  }

  #btn-new-chat svg { width: 15px; height: 15px; color: var(--text-dim); flex-shrink: 0; }

  .sidebar-section-label {
    padding: 14px 16px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  #chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  #chat-list::-webkit-scrollbar { width: 4px; }
  #chat-list::-webkit-scrollbar-track { background: transparent; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .chat-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 13px;
    transition: background 0.12s, color 0.12s;
    position: relative;
    group: true;
  }

  .chat-item:hover { background: var(--surface2); color: var(--text); }
  .chat-item.active { background: var(--surface2); color: var(--text); }

  .chat-item svg { width: 14px; height: 14px; flex-shrink: 0; }

  .chat-item-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chat-item-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: opacity 0.12s, color 0.12s;
    flex-shrink: 0;
  }

  .chat-item:hover .chat-item-delete { opacity: 1; }
  .chat-item-delete:hover { color: var(--accent); }
  .chat-item-delete svg { width: 13px; height: 13px; }

  .sidebar-footer {
    padding: 12px 8px;
    border-top: 1px solid var(--border);
  }

  #user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: default;
  }

  #user-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  #user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  #user-avatar svg { width: 16px; height: 16px; color: var(--text); }

  #user-name {
    flex: 1;
    font-size: 13px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #btn-logout {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.12s;
  }

  #btn-logout:hover { color: var(--accent); }
  #btn-logout svg { width: 15px; height: 15px; }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── TOPBAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
    flex-shrink: 0;
  }

  #chat-title-display {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Mode toggle */
  #mode-toggle {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    flex-shrink: 0;
  }

  .mode-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 16px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .mode-btn svg { width: 13px; height: 13px; }
  .mode-btn.active { background: var(--surface); color: var(--text); }
  .mode-btn.active.internet { color: #4a9eff; }
  .mode-btn.active.safe { color: #4caf82; }

  /* ── MESSAGES ── */
  #messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  #messages-wrap::-webkit-scrollbar { width: 4px; }
  #messages-wrap::-webkit-scrollbar-track { background: transparent; }
  #messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #messages {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 16px;
  }

  .welcome-avatar {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent-dim), #2d1a0a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--accent-dim);
  }

  .welcome-avatar svg { width: 32px; height: 32px; color: var(--accent); }

  #welcome h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
  }

  #welcome p {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 380px;
    line-height: 1.6;
  }

  .welcome-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 480px;
  }

  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    font-family: 'Inter', sans-serif;
  }

  .suggestion-chip:hover {
    background: var(--surface2);
    border-color: #3a3a3a;
    color: var(--text);
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    overflow: hidden;
  }

  .msg.marek .msg-avatar {
    background: linear-gradient(135deg, var(--accent-dim), #1a0a05);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
  }

  .msg.marek .msg-avatar svg { width: 15px; height: 15px; }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .msg.user .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg.user .msg-avatar svg { width: 15px; height: 15px; }

  .msg-body { max-width: calc(100% - 50px); }

  .msg-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .msg.user .msg-name { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
    word-break: break-word;
  }

  .msg.marek .msg-bubble {
    background: var(--marek-bubble);
    border: 1px solid var(--marek-accent);
    color: var(--text);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }

  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
  }

  /* Markdown in bubbles */
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { font-weight: 600; color: var(--text); }
  .msg-bubble em { font-style: italic; color: var(--text-dim); }
  .msg-bubble code {
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
  }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
  .msg-bubble li { margin-bottom: 4px; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT ── */
  #input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #input-wrap {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  #input-wrap:focus-within { border-color: #3a3a3a; }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    resize: none;
    outline: none;
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  #user-input::placeholder { color: var(--text-muted); }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); }

  #btn-send {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    align-self: flex-end;
  }

  #btn-send:hover { background: #cc1d0a; }
  #btn-send:active { transform: scale(0.95); }
  #btn-send:disabled { background: var(--surface2); cursor: not-allowed; }
  #btn-send svg { width: 16px; height: 16px; }

  .input-hint {
    max-width: 720px;
    margin: 8px auto 0;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 32px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .login-logo {
    width: 56px;
    height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-logo svg { width: 28px; height: 28px; }

  .login-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text);
  }

  .login-card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  #btn-google-login {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    justify-content: center;
  }

  #btn-google-login:hover { background: #2a2a2a; border-color: #3a3a3a; }
  #btn-google-login svg { width: 18px; height: 18px; }

  /* ── ERROR TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a1a1a;
    border: 1px solid var(--accent-dim);
    color: #ff8070;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MOBILE ── */
  #sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    align-items: center;
  }

  #sidebar-toggle svg { width: 20px; height: 20px; }

  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 49;
  }

  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 50;
      transform: translateX(-100%);
    }

    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }
    #sidebar-toggle { display: flex; }
  }

  /* Loading state */
  .loading-db {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 0;
  }

  .loading-db-dot {
    width: 6px; height: 6px;
    background: #4caf82;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <!-- Music note icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <h1>Marek</h1>
    <p>Umělá inteligence pro 10men.<br>Přihlas se svým Google účtem.</p>
    <button id="btn-google-login">
      <!-- Google icon -->
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Přihlásit se přes Google
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="logo-text">Marek <span>/ 10men</span></div>
    </div>
    <button id="btn-new-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nový chat
    </button>
  </div>
  <div class="sidebar-section-label">Konverzace</div>
  <div id="chat-list"></div>
  <div class="sidebar-footer">
    <div id="user-info">
      <div id="user-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span id="user-name">Nepřihlášen</span>
      <button id="btn-logout" title="Odhlásit se">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div id="sidebar-overlay"></div>

<!-- MAIN -->
<main id="main">
  <div id="topbar">
    <button id="sidebar-toggle" aria-label="Menu">

function loadChatList() {
  if (!currentUser) return;
  const chatsRef = ref(db, `marek_chats/${currentUser.uid}`);
  onValue(chatsRef, snap => {
    $chatList.innerHTML = '';
    if (!snap.exists()) return;

    const chats = [];
    snap.forEach(child => {
      chats.push({ id: child.key, ...child.val() });
    });

    // Sort by updatedAt desc
    chats.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      item.dataset.id = chat.id;
      item.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="chat-item-title">${escHtml(chat.title || 'Chat')}</span>
        <button class="chat-item-delete" data-id="${chat.id}" title="Smazat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
      `;

      item.addEventListener('click', (e) => {
        if (e.target.closest('.chat-item-delete')) return;
        loadChat(chat.id);
        $sidebar.classList.remove('open');
        $sidebarOverlay.classList.remove('open');
      });

      item.querySelector('.chat-item-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteChat(chat.id);
      });

      $chatList.appendChild(item);
    });
  });
}

async function loadChat(chatId) {
  if (!currentUser) return;
  currentChatId = chatId;
  messages = [];

  document.querySelectorAll('.chat-item').forEach(i => {
    i.classList.toggle('active', i.dataset.id === chatId);
  });

  const snap = await get(ref(db, `marek_chats/${currentUser.uid}/${chatId}`));
  if (!snap.exists()) return;

  const data = snap.val();
  $chatTitle.textContent = data.title || 'Chat';
  $welcome.style.display = 'none';
  $messages.innerHTML = '';

  if (data.messages) {
    Object.values(data.messages).forEach(msg => {
      messages.push({ role: msg.role, content: msg.content });
      renderMessage(msg.role === 'user' ? 'user' : 'marek', msg.content);
    });
  }

  scrollToBottom();
}

async function deleteChat(chatId) {
  if (!currentUser) return;
  await remove(ref(db, `marek_chats/${currentUser.uid}/${chatId}`));
  if (currentChatId === chatId) {
    currentChatId = null;
    messages = [];
    $messages.innerHTML = '';
    $messages.appendChild($welcome);
    $welcome.style.display = '';
    $chatTitle.textContent = 'Nový chat';
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 180) + 'px';
  updateSendBtn();
});

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!$btnSend.disabled) sendMessage();
  }
});

$btnSend.addEventListener('click', sendMessage);

document.querySelectorAll('.suggestion-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    $input.value = chip.dataset.text;
    $input.dispatchEvent(new Event('input'));
    sendMessage();
  });
});

function updateSendBtn() {
  $btnSend.disabled = isLoading || !$input.value.trim() || !currentUser;
}

async function sendMessage() {
  const text = $input.value.trim();
  if (!text || isLoading || !currentUser) return;

  // Hide welcome
  $welcome.style.display = 'none';

  // Add user message
  messages.push({ role: 'user', content: text });
  renderMessage('user', text);
  $input.value = '';
  $input.style.height = 'auto';
  isLoading = true;
  updateSendBtn();

  // Typing indicator
  const typingEl = renderTyping();
  scrollToBottom();

  const userName = currentUser?.displayName?.split(' ')[0] || '';

  try {
    // Build system prompt
    let systemPrompt;
    if (currentMode === 'safe') {
      const dbContext = await fetchDbContext();
      systemPrompt = SYSTEM_PROMPT_SAFE(dbContext, userName);
    } else {
      systemPrompt = SYSTEM_PROMPT_INTERNET(userName);
    }

    // Build Gemini request
    const contents = messages.map(m => ({
      role: m.role === 'user' ? 'user' : 'model',
      parts: [{ text: m.content }]
    }));

    const body = {
      system_instruction: {
        role: "system",
        parts: [{ text: systemPrompt }]
      },
      contents,
      generationConfig: {
        temperature: 0.85,
        maxOutputTokens: 2048,
        topP: 0.95
      }
    };

    if (!geminiApiKeyFromDb) throw new Error('API klíč ještě nebyl načten.');
    const cleanApiKey = geminiApiKeyFromDb.trim();
    
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: 'POST',
      credentials: 'omit',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cleanApiKey}`
      },
      body: JSON.stringify({
        model: GEMINI_MODEL,
        messages: [
          { role: "system", content: systemPrompt },
          ...messages.map(m => ({
            role: m.role === 'model' ? 'assistant' : 'user',
            content: m.content
          }))
        ],
        temperature: 0.85,
        max_tokens: 2048
      })
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Chyba API');
    }
    
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '…';

    // Remove typing, add reply
    typingEl.remove();
    messages.push({ role: 'model', content: reply });
    renderMessage('marek', reply);
    scrollToBottom();

    // Save to Firebase
    await saveChat(text, reply);

  } catch (e) {
    typingEl.remove();
    showToast('Chyba: ' + e.message);
    messages.pop(); // remove failed user msg from history
  } finally {
    isLoading = false;
    updateSendBtn();
  }
}

// ── DB CONTEXT ────────────────────────────────────────────────────────
async function fetchDbContext() {
  try {
    const [akceSnap, repertoarSnap, programSnap, membersSnap, dochazkaSnap, 
           aktualitySnap, todosSnap, grilovackaSnap] = await Promise.all([
      get(ref(db, '/akce')),
      get(ref(db, '/repertoar')),
      get(ref(db, '/program')),
      get(ref(db, '/members')),
      get(ref(db, '/dochazka')),
      get(ref(db, '/aktuality')),
      get(ref(db, '/todos')),
      get(ref(db, '/grilovacka_items'))
    ]);

    const akce      = akceSnap.exists()      ? akceSnap.val()      : {};
    const repertoar = repertoarSnap.exists() ? repertoarSnap.val() : {};
    const program   = programSnap.exists()   ? programSnap.val()   : {};
    const members   = membersSnap.exists()   ? membersSnap.val()   : {};
    const dochazka  = dochazkaSnap.exists()  ? dochazkaSnap.val()  : {};
    const aktuality = aktualitySnap.exists() ? aktualitySnap.val() : {};
    const todos     = todosSnap.exists()     ? todosSnap.val()     : {};
    const grilovacka = grilovackaSnap.exists() ? grilovackaSnap.val() : {};

    // Spoj program s názvy akcí a skladeb
    const programSpojeny = Object.values(program).map(p => {
      const akce_obj = Object.values(akce).find(a => a.id === p.id_akce) || {};
      const skladba  = Object.values(repertoar).find(r => r.id === p.song_id) || {};
      return {
        akce: akce_obj.nazev || akce_obj.name || p.id_akce,
        datum: akce_obj.datum || akce_obj.date || '',
        poradi: p.order,
        skladba: skladba.nazev || skladba.name || skladba.title || p.song_id
      };
    }).sort((a, b) => (a.datum > b.datum ? 1 : -1));

    // Členové – jen základní info
    const membersList = Object.values(members).map(m => ({
      jmeno: m.name || m.jmeno,
      hlas: m.voice || m.hlas,
      aktivni: m.active !== false
    }));

    let context = `=== PROGRAM ZKOUŠEK A KONCERTŮ ===\n${JSON.stringify(programSpojeny)}\n\n`;
    context += `=== AKCE ===\n${JSON.stringify(Object.values(akce))}\n\n`;
    context += `=== ČLENOVÉ ===\n${JSON.stringify(membersList)}\n\n`;
    context += `=== REPERTOÁR ===\n${JSON.stringify(Object.values(repertoar))}\n\n`;
    context += `=== DOCHÁZKA ===\n${JSON.stringify(dochazka)}\n\n`;
    context += `=== AKTUALITY ===\n${JSON.stringify(aktuality)}\n\n`;
    context += `=== TODOS ===\n${JSON.stringify(todos)}\n\n`;
    context += `=== GRILOVAČKA ===\n${JSON.stringify(grilovacka)}\n\n`;

    return context.length > 120000 
      ? context.slice(0, 120000) + '\n... (zkráceno)' 
      : context;

  } catch (e) {
    return `Databázi se nepodařilo načíst: ${e.message}`;
  }
}

// ── SAVE CHAT ─────────────────────────────────────────────────────────
async function saveChat(userText, replyText) {
  if (!currentUser) return;

  if (!currentChatId) {
    // New chat – create
    const chatRef = push(ref(db, `marek_chats/${currentUser.uid}`));
    currentChatId = chatRef.key;
    $chatTitle.textContent = userText.slice(0, 50);

    // Mark active in sidebar
    setTimeout(() => {
      document.querySelectorAll('.chat-item').forEach(i => {
        i.classList.toggle('active', i.dataset.id === currentChatId);
      });
    }, 300);
  }

  // Save all messages
  const chatData = {
    title: messages[0]?.content?.slice(0, 50) || 'Chat',
    updatedAt: Date.now(),
    messages: {}
  };

  messages.forEach((m, i) => {
    chatData.messages[`msg_${String(i).padStart(4, '0')}`] = {
      role: m.role,
      content: m.content
    };
  });

  await set(ref(db, `marek_chats/${currentUser.uid}/${currentChatId}`), chatData);
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderMessage(who, text) {
  const isUser = who === 'user';
  const div = document.createElement('div');
  div.className = `msg ${who}`;

  const avatarHtml = isUser
    ? (userPhotoURL
        ? `<img src="${userPhotoURL}" alt="">`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`)
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;

  div.innerHTML = `
    <div class="msg-avatar">${avatarHtml}</div>
    <div class="msg-body">
      <div class="msg-name">${isUser ? (currentUser?.displayName?.split(' ')[0] || 'Ty') : 'Marek'}</div>
      <div class="msg-bubble">${formatText(text)}</div>
    </div>
  `;

  $messages.appendChild(div);
  return div;
}

function renderTyping() {
  const div = document.createElement('div');
  div.className = 'msg marek';
  div.innerHTML = `
    <div class="msg-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <div class="msg-body">
      <div class="msg-name">Marek</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>
  `;
  $messages.appendChild(div);
  return div;
}

function formatText(text) {
  // Basic markdown-lite
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollToBottom() {
  $messagesWrap.scrollTop = $messagesWrap.scrollHeight;
}

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 4000);
}

// iOS keyboard fix
if (/iPhone|iPad/.test(navigator.userAgent)) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('main').style.height = window.visualViewport.height + 'px';
  });
}
  
</script>
</body>
</html>
